name: Collect Traffic Analytics

on:
  # Run daily at 1 AM UTC
  schedule:
    - cron: "0 1 * * *"
  
  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  collect-traffic:
    runs-on: ubuntu-latest
    name: Collect GitHub traffic data
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: Collect traffic data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python collect_traffic.py
      
      - name: Commit traffic history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet traffic-history/; then
            echo "No changes to commit"
          else
            git add traffic-history/
            git commit -m "chore: collect traffic analytics - $(date -u +'%Y-%m-%d')"
            git push
          fi

